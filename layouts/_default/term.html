{{ partial "header" . }}
<main>
  <h1 class="list">Pages related to {{ .Title }}</h1>
  {{ range (.Paginator (.Site.Params.itemsperpage | default (int 5)) ).Pages }}
    {{ partial "list-item" . }}
  {{ end }}

  {{ partial "paginator" . }}
  {{ partial "tag-cloud" . }}
</main>
{{ partial "footer" . }}
